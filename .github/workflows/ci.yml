name: ci

# CPU-only checks. The CUDA engine (cuda/, internal/engine/cuda, cmd/...) links
# against libfucina.a and can only be built/validated on a DGX Spark GB10, so it
# is intentionally NOT built here — see CONTRIBUTING.md.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: gofmt · vet · test (pure-Go packages)
    runs-on: ubuntu-latest
    env:
      # Pure-Go packages only (mirrors the Makefile GO_TEST_PKGS). The cgo engine
      # package and cmd/ require the CUDA toolchain and are excluded.
      PKGS: ./internal/server/ ./internal/tokenizer/ ./internal/sampler/ ./internal/chat/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet $PKGS

      - name: golangci-lint
        # v7 is required for golangci-lint v2 (v6 only supports v1.x).
        uses: golangci/golangci-lint-action@v7
        with:
          # Must be built with Go >= the go.mod target (1.26): older builds refuse
          # to lint a newer language version. v2.11.4 is built with go1.26.
          version: v2.11.4
          # Lint only the pure-Go packages (same set as $PKGS). The cgo engine and
          # cmd/ need libfucina.a and are excluded, mirroring the Makefile.
          args: ./internal/server/ ./internal/tokenizer/ ./internal/sampler/ ./internal/chat/

      - name: go test (race)
        run: go test $PKGS -race -count=1

      - name: go test (coverage)
        run: |
          go test $PKGS -count=1 -coverprofile=cover.out
          go tool cover -func=cover.out | tail -1
